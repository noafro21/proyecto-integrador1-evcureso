<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Moderación - Evcureso</title>

    <link rel="icon" type="image/png" href="./assets/images/favicon-3.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
</head>

<body class="bg-light">

    <header class="evc-header text-white">
        <div id="navbar-container"></div>
    </header>

    <main class="container my-5">
        <div class="row mb-4 align-items-center">
            <div class="col-md-8">
                <h1 class="h2 fw-bold text-dark">Panel de Moderación</h1>
                <p class="text-muted">Centro de control del sistema.</p>
            </div>
            <div class="col-md-4 text-md-end">
                <span class="badge bg-danger fs-6 px-3 py-2 shadow-sm">🛡️ Acceso Restringido</span>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="moderatorTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold text-dark" id="users-tab" data-bs-toggle="tab"
                    data-bs-target="#users-pane" type="button" role="tab">
                    👥 Solicitudes (Promotores)
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-dark" id="events-tab" data-bs-toggle="tab"
                    data-bs-target="#events-pane" type="button" role="tab">
                    📅 Eventos Comunitarios
                </button>
            </li>
            <!-- NUEVO: Pestaña de Todos los Usuarios -->
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-dark" id="all-users-tab" data-bs-toggle="tab"
                    data-bs-target="#all-users-pane" type="button" role="tab">
                    ⚙️ Gestión de Usuarios
                </button>
            </li>
        </ul>

        <div class="tab-content" id="moderatorTabsContent">

            <!-- Pestaña 1: Solicitudes de Promotores -->
            <div class="tab-pane fade show active" id="users-pane" role="tabpanel" tabindex="0">
                <div class="card border-0 shadow-sm p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Correo</th>
                                    <th>Estado</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="pendingPromotersContainer">
                                <tr>
                                    <td colspan="4" class="text-center py-4 text-muted">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Pestaña 2: Eventos Comunitarios -->
            <div class="tab-pane fade" id="events-pane" role="tabpanel" tabindex="0">
                <div class="card border-0 shadow-sm p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Título del Evento</th>
                                    <th>Creado por</th>
                                    <th>Fecha</th>
                                    <th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="pendingEventsContainer">
                                <tr>
                                    <td colspan="4" class="text-center py-4 text-muted">Cargando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Pestaña 3: TODOS LOS USUARIOS (Gestión) -->
            <div class="tab-pane fade" id="all-users-pane" role="tabpanel" tabindex="0">
                <div class="card border-0 shadow-sm p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre y Correo</th>
                                    <th>Rol Actual</th>
                                    <th>Estado</th>
                                    <th class="text-end">Sanción (Degradar)</th>
                                </tr>
                            </thead>
                            <tbody id="allUserPromotersContainer">
                                <tr>
                                    <td colspan="4" class="text-center py-4 text-muted">Cargando usuarios...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/load-navbar.js"></script>
    <script src="./js/panel-moderator.js"></script>
</body>

</html>
