<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Evcureso</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/images/favicon-3.png"
        onerror="this.href='https://via.placeholder.com/32x32?text=E'">

    <!-- Fuentes de Google: Montserrat y Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- FontAwesome para los íconos-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap 5 CSS) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo Global Personalizado) -->
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
</head>

<body class="bg-light">

    <!-- El Header se inyectará dinámicamente con load-navbar.js -->
    <header class="evc-header text-white" id="navbar-container"></header>

    <main class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <section class="card shadow-sm border-0 w-100" style="max-width: 500px;">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-2">Crea tu cuenta</h1>
                    <p class="text-muted small">Únete para descubrir y guardar eventos locales.</p>
                </div>

                <!-- Formulario -->
                <form id="evcRegisterForm">
                    <div class="mb-3">
                        <label for="regFullName" class="form-label fw-bold small"><i
                                class="fa-solid fa-id-card text-muted me-1"></i> Nombre Completo</label>
                        <input type="text" class="form-control evc-form-input shadow-none" id="regFullName"
                            placeholder="Juan Pérez" required autocomplete="name">
                    </div>

                    <div class="mb-3">
                        <label for="regEmail" class="form-label fw-bold small"><i
                                class="fa-solid fa-envelope text-muted me-1"></i> Correo Electrónico</label>
                        <input type="email" class="form-control evc-form-input shadow-none" id="regEmail"
                            placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>

                    <div class="mb-4">
                        <label for="regPassword" class="form-label fw-bold small"><i
                                class="fa-solid fa-lock text-muted me-1"></i> Contraseña</label>
                        <input type="password" class="form-control evc-form-input shadow-none" id="regPassword"
                            placeholder="Crea una contraseña segura" required autocomplete="new-password">
                        <div class="form-text small"><i class="fa-solid fa-circle-info me-1"></i> Mínimo 6 caracteres.
                        </div>
                    </div>

                    <!-- Switch del Promotor-->
                    <div class="card evc-promotor-card border-0 mb-4 p-3 rounded">
                        <div class="form-check form-switch">
                            <input class="form-check-input evc-switch-input shadow-none" type="checkbox" role="switch"
                                id="regIsPromotor">
                            <label class="form-check-label small fw-bold evc-promotor-label" for="regIsPromotor">
                                Quiero ser Promotor de Eventos
                            </label>
                        </div>
                        <p class="small mb-0 mt-1 evc-promotor-help" id="promotorHelpText">
                            Tu cuenta será creada como "Explorador". Si activas esto, se enviará una solicitud al
                            Moderador para habilitar funciones de publicación.
                        </p>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn fw-bold py-2 evc-btn-suggest">Crear Cuenta</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p class="small text-muted mb-0">¿Ya tienes una cuenta? <a href="user-login.html"
                            class="fw-bold text-decoration-none evc-link-forgot">Inicia sesión aquí</a></p>
                </div>

            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/load-navbar.js"></script>
    <script src="./js/user-register.js"></script>
</body>

</html>
