<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Evcureso</title>

    <link rel="icon" type="image/png" href="./assets/images/favicon-3.png"
        onerror="this.href='https://via.placeholder.com/32x32?text=E'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./css/normalize.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/auth-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
</head>

<body class="bg-light">

    <header class="evc-header text-white shadow-sm" id="navbar-container"></header>

    <main class="evc-auth-container container my-5 d-flex justify-content-center">
        <section class="evc-auth-card card shadow border-0 w-100" style="max-width: 500px;">

            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="h4 fw-bold mb-1">Crea tu cuenta</h2>
                    <p class="text-muted small">Únete para descubrir y guardar eventos locales.</p>
                </div>

                <form id="evcRegisterForm" class="evc-form">
                    <div class="mb-3">
                        <label for="regFullName" class="form-label fw-bold small">Nombre Completo</label>
                        <input type="text" class="form-control evc-input" id="regFullName" placeholder="Juan Pérez"
                            required autocomplete="name">
                    </div>

                    <div class="mb-3">
                        <label for="regEmail" class="form-label fw-bold small">Correo Electrónico</label>
                        <input type="email" class="form-control evc-input" id="regEmail"
                            placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>

                    <div class="mb-3">
                        <label for="regPassword" class="form-label fw-bold small">Contraseña</label>
                        <input type="password" class="form-control evc-input" id="regPassword"
                            placeholder="Crea una contraseña segura" required autocomplete="new-password">
                        <div class="form-text small">Mínimo 6 caracteres.</div>
                    </div>

                    <div class="card bg-light border-0 mb-4 p-3 rounded">
                        <div class="form-check form-switch">
                            <input class="form-check-input evc-switch-input" type="checkbox" role="switch"
                                id="regIsPromotor">
                            <label class="form-check-label small fw-bold text-dark" for="regIsPromotor">Quiero ser
                                Promotor de Eventos</label>
                        </div>
                        <p class="small text-muted mb-0 mt-1" id="promotorHelpText">
                            Tu cuenta será creada como "Explorador". Si activas esto, se enviará una solicitud al
                            Moderador para habilitar funciones de publicación.
                        </p>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold evc-btn-submit py-2">Crear Cuenta</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/load-navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/user-register.js"></script>
</body>

</html>
