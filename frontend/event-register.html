<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Evento - Evcureso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
    <link rel="stylesheet" href="./css/event-register-style.css">
</head>

<body class="bg-light">

    <header class="evc-header text-white " id="navbar-container"></header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <section class="card shadow border-0 p-4">
                    <h2 class="h4 fw-bold mb-4 text-center">Publicar Nuevo Evento</h2>

                    <form id="evcCreateEventForm">
                        <!-- Título -->
                        <div class="mb-3">
                            <label for="eventTitle" class="form-label fw-bold small">Título del Evento</label>
                            <input type="text" class="form-control" id="eventTitle"
                                placeholder="Ej: Feria de Emprendedores" required>
                        </div>

                        <!-- Descripción -->
                        <div class="mb-3">
                            <label for="eventDescription" class="form-label fw-bold small">Descripción</label>
                            <textarea class="form-control" id="eventDescription" rows="3"
                                placeholder="Cuéntanos de qué trata el evento..." required></textarea>
                        </div>

                        <!-- Fecha y Hora -->
                        <div class="mb-3">
                            <label for="eventDate" class="form-label fw-bold small">Fecha y Hora</label>
                            <input type="datetime-local" class="form-control" id="eventDate" required>
                        </div>

                        <!-- Dirección (addressName) -->
                        <div class="mb-3">
                            <label for="eventAddress" class="form-label fw-bold small">Lugar / Dirección</label>
                            <input type="text" class="form-control" id="eventAddress"
                                placeholder="Ej: Salón Comunal o Parque Central" required>
                        </div>

                        <!-- URL de Imagen -->
                        <div class="mb-3">
                            <label for="eventImageUrl" class="form-label fw-bold small">URL de la Imagen</label>
                            <input type="url" class="form-control" id="eventImageUrl"
                                placeholder="https://link-de-la-imagen.jpg">
                        </div>

                        <!-- Tipo de Evento (sourceType) -->
                        <div class="mb-3">
                            <label for="eventSourceType" class="form-label fw-bold small">Tipo de Evento</label>
                            <select class="form-select" id="eventSourceType" required>
                                <option value="" disabled selected>Selecciona el tipo de evento</option>
                                <option value="Oficial">Oficial (Promotores y Moderadores)</option>
                                <option value="Comunitaria">Comunitaria (Sugerencia vecinal)</option>
                            </select>
                        </div>

                        <!-- Categorías (NUEVO) -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Categorías (Selecciona una o más)</label>
                            <div class="d-flex flex-wrap gap-2">
                                <div class="form-check">
                                    <input class="form-check-input category-checkbox" type="checkbox" value="#AireLibre"
                                        id="catAire">
                                    <label class="form-check-label text-muted small" for="catAire">#AireLibre</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input category-checkbox" type="checkbox" value="#Cultura"
                                        id="catCultura">
                                    <label class="form-check-label text-muted small" for="catCultura">#Cultura</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input category-checkbox" type="checkbox"
                                        value="#Gastronomía" id="catGastro">
                                    <label class="form-check-label text-muted small"
                                        for="catGastro">#Gastronomía</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input category-checkbox" type="checkbox"
                                        value="#Ecoturismo" id="catEco">
                                    <label class="form-check-label text-muted small" for="catEco">#Ecoturismo</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input category-checkbox" type="checkbox" value="#Música"
                                        id="catMusica">
                                    <label class="form-check-label text-muted small" for="catMusica">#Música</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold py-2">Publicar Evento</button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/load-navbar.js"></script>
    <script src="./js/event-register.js"></script>
</body>

</html>
