<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evcureso - Descubre eventos cerca de ti</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/images/favicon-3.png"
        onerror="this.href='https://via.placeholder.com/32x32?text=E'">
    <!-- Fuentes de Google: Montserrat (Títulos) y Open Sans (Cuerpos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS (CDN), NORMALIZE -->
    <link rel="stylesheet" href="./css/normalize.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
    <link rel="stylesheet" href="./css/sidebar-style.css">
    <link rel="stylesheet" href="./css/feed-style.css">
</head>

<body>

    <!-- HEADER & NAVEGACIÓN PRINCIPAL-->
    <header class="evc-header text-white " id="navbar-container"></header>

    <!-- CONTENEDOR PRINCIPAL (GRID RESPONSIVE) -->
    <main class="evc-main-container container-fluid mt-3">
        <h1 class="h2">Descubre eventos cerca de ti</h1>
        <!-- Se usa un row de Bootstrap que colapsará en móviles (< 768px) a 1 sola columna -->
        <div class="row">

            <!-- BARRA LATERAL (Filtros) - Oculto en móviles por defecto, ocupa 3 columnas en desktop -->
            <aside class="evc-sidebar-filters col-12 col-md-3 mb-3" aria-label="Filtros de búsqueda y categorías">
                <div class="card p-3 shadow-sm ">

                    <!-- Encabezado de los filtros -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h5 m-0 fw-bold">Filtros</h2>
                        <button type="button"
                            class="btn btn-sm btn-link text-decoration-none text-muted evc-btn-clear-filters"
                            aria-label="Limpiar todos los filtros">Limpiar</button>
                    </div>

                    <!-- Formulario de Filtros -->
                    <form class="evc-filters-form">

                        <!-- 1. Filtro: Radio de Descubrimiento (Radio Buttons) -->
                        <!-- Se usa fieldset para agrupar semánticamente los radio buttons -->
                        <fieldset class="mb-4 evc-filter-group">
                            <legend class="h6 fw-bold evc-filter-title fs-6">Radio de Descubrimiento</legend>

                            <div class="form-check evc-radio-wrapper">
                                <input class="form-check-input evc-radio-input" type="radio" name="distanceFilter"
                                    id="dist5" value="5" checked>
                                <label class="form-check-label evc-radio-label text-muted" for="dist5">A menos de 5
                                    km</label>
                            </div>
                            <div class="form-check evc-radio-wrapper">
                                <input class="form-check-input evc-radio-input" type="radio" name="distanceFilter"
                                    id="dist10" value="10">
                                <label class="form-check-label evc-radio-label text-muted" for="dist10">Hasta 10
                                    km</label>
                            </div>
                            <div class="form-check evc-radio-wrapper">
                                <input class="form-check-input evc-radio-input" type="radio" name="distanceFilter"
                                    id="dist20" value="20">
                                <label class="form-check-label evc-radio-label text-muted" for="dist20">Hasta 20 km
                                    (Explorar más)</label>
                            </div>
                        </fieldset>

                        <!-- 2. Filtro: Fecha (Select) -->
                        <div class="mb-4 evc-filter-group">
                            <label for="dateFilter" class="form-label h6 fw-bold evc-filter-title fs-6">¿Cuándo?</label>
                            <select class="form-select evc-select-input text-muted" id="dateFilter">
                                <option value="cualquiera">Cualquier fecha</option>
                                <option value="hoy">Hoy</option>
                                <option value="manana">Mañana</option>
                                <option value="fin-semana" selected>Este fin de semana</option>
                            </select>
                        </div>

                        <!-- 3. Filtro: Categorías (Checkboxes) -->
                        <!-- Se usa fieldset para agrupar semánticamente los Checkboxes -->
                        <fieldset class="mb-4 evc-filter-group">
                            <legend class="h6 fw-bold evc-filter-title fs-6">Categorías de Interés</legend>

                            <div class="form-check evc-checkbox-wrapper mb-2">
                                <input class="form-check-input evc-checkbox-input" type="checkbox" id="catAireLibre"
                                    value="aire-libre">
                                <label class="form-check-label evc-checkbox-label text-muted"
                                    for="catAireLibre">#AireLibre</label>
                            </div>
                            <div class="form-check evc-checkbox-wrapper mb-2">
                                <input class="form-check-input evc-checkbox-input" type="checkbox" id="catCultura"
                                    value="cultura">
                                <label class="form-check-label evc-checkbox-label text-muted"
                                    for="catCultura">#Cultura</label>
                            </div>
                            <div class="form-check evc-checkbox-wrapper mb-2">
                                <input class="form-check-input evc-checkbox-input" type="checkbox" id="catGastronomia"
                                    value="gastronomia">
                                <label class="form-check-label evc-checkbox-label text-muted"
                                    for="catGastronomia">#Gastronomía</label>
                            </div>
                            <div class="form-check evc-checkbox-wrapper mb-2">
                                <input class="form-check-input evc-checkbox-input" type="checkbox" id="catEcoturismo"
                                    value="ecoturismo">
                                <label class="form-check-label evc-checkbox-label text-muted"
                                    for="catEcoturismo">#Ecoturismo</label>
                            </div>
                        </fieldset>
                    </form>

                </div>
            </aside>

            <!-- ==========================================
                 CATÁLOGO DE EVENTOS (FEED) - 9 Columnas
                 ========================================== -->
            <section class="evc-event-feed col-12 col-md-9 mb-4" aria-labelledby="feed-title">
                <h2 id="feed-title" class="visually-hidden">Catálogo de Eventos</h2>

                <!-- Encabezado de la lista -->
                <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                    <h3 class="h4 m-0 fw-bold text-dark">Descubre qué hacer hoy</h3>
                    <span id="eventsCounter" class="badge bg-primary rounded-pill evc-feed-counter fs-6 px-3 py-2"
                        aria-label="Contador de eventos" role="alert">
                        Buscando eventos...
                    </span>
                </div>

                <!-- Cuadrícula (Grid) de Tarjetas -->
                <div id="eventsContainer" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 evc-feed-container"
                    tabindex="0" aria-label="Lista de tarjetas de eventos" role="list">
                    <!-- Las tarjetas de eventos se cargarán dinámicamente aquí -->
                </div>
            </section>
        </div>
    </main>


    <!-- Bootstrap 5 JS Bundle (CDN) para que el menú móvil colapse -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!--SweetAlert2 para las alertas de guardar en plan -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Script para cargar la barra de navegación -->
    <script src="./js/load-navbar.js"></script>
    <script src="./js/list-event.js"></script>
</body>

</html>
