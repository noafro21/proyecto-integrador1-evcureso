<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evcureso - Descubre eventos cerca de ti</title>

    <!-- Fuentes de Google: Montserrat (Títulos) y Open Sans (Cuerpos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS (CDN), NORMALIZE -->
    <link rel="stylesheet" href="./css/normalize.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- HEADER & NAVEGACIÓN PRINCIPAL-->
    <header class="evc-header text-white bg-dark">
        <!-- Usamos navbar de bootstrap como base, pero con nuestras clases semánticas -->
        <nav class="evc-nav navbar navbar-expand-lg navbar-dark container-fluid"
            aria-label="Navegación principal de Evcureso">

            <!-- Logo y Nombre de la marca -->
            <a class="navbar-brand d-flex align-items-center" href="index.html" aria-label="Ir a la página de inicio">
                <!-- Nota: Aquí irá la imagen de tu logo. -->
                <img src="assets/images/logo.jpg" alt="Logo de Evcureso" width="40" height="40"
                    class="me-2 rounded-circle" onerror="this.src='https://via.placeholder.com/40x40?text=E'">
                <span class="evc-brand-name fw-bold">Evcureso</span>
            </a>

            <!-- Botón de menú colapsable para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#evcMainNav"
                aria-controls="evcMainNav" aria-expanded="false" aria-label="Abrir menú de navegación">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Contenido del menú -->
            <div class="collapse navbar-collapse" id="evcMainNav">

                <!-- Buscador Central -->
                <form class="evc-search-form d-flex mx-auto my-2 my-lg-0 w-50" role="search">
                    <label for="mainSearchInput" class="visually-hidden">Buscar eventos, lugares o categorías</label>
                    <input class="form-control me-2 evc-search-input" type="search" id="mainSearchInput"
                        placeholder="Buscar eventos (Ej. Concierto, Feria...)" aria-label="Buscar">
                    <button class="btn evc-btn-search text-white btn-primary" type="submit">Buscar</button>
                </form>

                <!-- Enlaces de usuario / Menú derecho -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Explorar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mi-perfil.html">Mi Plan para el Finde</a>
                    </li>
                    <!-- Botón de sugerir evento (Destacado) -->
                    <li class="nav-item ms-lg-3">
                        <button class="btn evc-btn-suggest text-white fw-bold btn-success"
                            aria-label="Sugerir un nuevo evento">
                            + Sugerir Evento
                        </button>
                    </li>
                    <!-- Acceso / Perfil -->
                    <li class="nav-item ms-lg-3">
                        <a href="login.html" class="nav-link evc-login-link" aria-label="Iniciar sesión o registrarse">
                            Ingresar
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>


    <!-- Bootstrap 5 JS Bundle (CDN) para que el menú móvil colapse -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
