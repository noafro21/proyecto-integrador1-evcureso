<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Evcureso</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/images/favicon-3.png"
        onerror="this.href='https://via.placeholder.com/32x32?text=E'">

    <!-- Fuentes de Google: Montserrat y Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- FontAwesome para los íconos premium -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap 5 CSS y Normalize (90% de los estilos) -->
    <link rel="stylesheet" href="./css/normalize.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo Global Personalizado (10% de los estilos: colores, fuentes, modo oscuro) -->
    <link rel="stylesheet" href="./css/global-style.css">
    <link rel="stylesheet" href="./css/header-style.css">
</head>

<body class="bg-light">

    <!-- El Header se inyectará dinámicamente con tu load-navbar.js -->
    <header class="evc-header text-white" id="navbar-container"></header>

    <main class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <section class="card shadow-sm border-0 w-100" style="max-width: 450px;">
            <div class="card-body p-4 p-md-5">

                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-2">¡Hola de nuevo!</h1>
                    <p class="text-muted small">Ingresa tus credenciales para continuar.</p>
                </div>

                <!-- Formulario original con tus IDs intactos -->
                <form id="evcLoginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label fw-bold small"><i
                                class="fa-solid fa-envelope text-muted me-1"></i> Correo Electrónico</label>
                        <input type="email" class="form-control evc-form-input shadow-none" id="loginEmail"
                            placeholder="ejemplo@correo.com" required autocomplete="email">
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="loginPassword" class="form-label fw-bold small m-0"><i
                                    class="fa-solid fa-lock text-muted me-1"></i> Contraseña</label>
                            <a href="#" class="small text-decoration-none evc-link-forgot">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" class="form-control evc-form-input shadow-none" id="loginPassword"
                            placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn fw-bold py-2 evc-btn-submit">Iniciar
                            Sesión</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p class="small text-muted mb-0">¿No tienes una cuenta? <a href="user-register.html"
                            class="fw-bold text-decoration-none evc-link-forgot">Regístrate aquí</a></p>
                </div>

                <hr class="my-4 opacity-25">
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/load-navbar.js"></script>
    <script src="./js/user-login.js"></script>
</body>

</html>
